services:
  - type: web
    name: spark-peerlees-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://spark-peerlees.onrender.com
      - key: NODE_VERSION
        value: 18.x
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    rewrites:
      - source: /*
        destination: /index.html
